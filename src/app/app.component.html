<div class="app-container" [class.ready]="isReady">
  <header class="topbar" *ngIf="mostrarLayout && isReady">
    <mat-toolbar class="topbar__toolbar">
      <a class="brand" routerLink="/home" aria-label="Ir al inicio">
        <img class="logo" src="assets/logo.png" alt="" aria-hidden="true">
        <span class="brand__text">
          <strong>TrikiTrueke</strong>
          <small>Intercambios que conectan</small>
        </span>
      </a>

      <nav class="topbar__nav" aria-label="Navegación principal">
        <a mat-button routerLink="/home" routerLinkActive="active-link">Inicio</a>
        <a mat-button routerLink="/categorias" routerLinkActive="active-link">Categorías</a>
        <a mat-button routerLink="/articulos" routerLinkActive="active-link">Artículos</a>
        <a mat-button routerLink="/ayuda" routerLinkActive="active-link">Ayuda</a>
      </nav>

      <span class="topbar__spacer"></span>

      <button mat-fab extended [matMenuTriggerFor]="profileMenu" class="profile-trigger" aria-label="Abrir menú de perfil">
        <mat-icon>account_circle</mat-icon>
        <span class="profile-trigger__text">
          <strong>{{ primerNombre }}</strong>
          <small>{{ authService.currentUser?.email }}</small>
        </span>
        <mat-icon iconPositionEnd>expand_more</mat-icon>
      </button>

      <mat-menu #profileMenu="matMenu" xPosition="before">
        <button mat-menu-item routerLink="/perfil">
          <mat-icon>person</mat-icon>
          <span>Mi perfil</span>
        </button>
        <button mat-menu-item (click)="logout()" aria-label="Cerrar sesión">
          <mat-icon>logout</mat-icon>
          <span>Cerrar sesión</span>
        </button>
      </mat-menu>
    </mat-toolbar>
  </header>

  <main *ngIf="isReady">
    <router-outlet></router-outlet>
  </main>
</div>

<footer class="footer" *ngIf="mostrarLayout && isReady">
  <p>© 2025 TrikiTrueke — Todos los derechos reservados</p>
  <div class="social">
    <a href="https://www.instagram.com/paan.t0">
      <img src="assets/Instagram.png" alt="Instagram">
    </a>
  </div>
</footer>
