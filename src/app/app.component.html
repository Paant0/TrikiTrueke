<div class="app-container" [class.ready]="isReady">
  <header class="topbar" *ngIf="mostrarLayout && isReady">
    <mat-toolbar class="topbar__toolbar">
      <a class="brand" routerLink="/home" aria-label="Ir al inicio">
        <img class="logo" src="assets/logo.png" alt="" aria-hidden="true">
        <span class="brand__text">
          <strong>TrikiTrueke</strong>
          <small>Intercambios que conectan</small>
        </span>
      </a>

      <nav class="topbar__nav" aria-label="Navegación principal">
        <a mat-button routerLink="/home" routerLinkActive="active-link">Inicio</a>
        <a mat-button routerLink="/categorias" routerLinkActive="active-link">Categorías</a>
        <a mat-button routerLink="/articulos" routerLinkActive="active-link">Artículos</a>
        <a mat-button routerLink="/ayuda" routerLinkActive="active-link">Ayuda</a>
      </nav>

      <div class="topbar__search-shell">
        <mat-form-field appearance="outline" class="topbar__search-field" subscriptSizing="dynamic">
          <mat-icon matPrefix aria-hidden="true">search</mat-icon>
          <input
            #searchInput
            matInput
            type="search"
            placeholder="Buscar artículos, categorías..."
            aria-label="Buscar en la plataforma"
            [value]="searchQuery"
            (focus)="focusSearch()"
            (input)="onSearchInput(searchInput.value)"
          />
          <button
            *ngIf="searchQuery"
            mat-icon-button
            matSuffix
            type="button"
            aria-label="Limpiar búsqueda"
            (click)="clearSearch()"
          >
            <mat-icon>close</mat-icon>
          </button>
        </mat-form-field>

        <section class="search-results" *ngIf="searchOpen && (searchLoading || searchQuery.trim().length >= 2)">
          <div class="search-results__header">
            <span *ngIf="searchLoading">Buscando...</span>
            <span *ngIf="!searchLoading">Resultados</span>
          </div>

          <button
            class="search-result"
            type="button"
            *ngFor="let articulo of searchResults"
            (mousedown)="$event.preventDefault()"
            (click)="selectSearchResult(articulo.id)"
          >
            <img class="search-result__img" [src]="articulo.imagen ? articulo.imagen : 'assets/placeholder.webp'" [alt]="articulo.nombre" />
            <div class="search-result__body">
              <strong>{{ articulo.nombre }}</strong>
              <span>{{ obtenerNombreUsuarioResultado(articulo) }} · {{ articulo.categoria }}</span>
            </div>
            <mat-icon>arrow_forward</mat-icon>
          </button>

          <div class="search-results__empty" *ngIf="!searchLoading && searchQuery.trim().length >= 2 && searchResults.length === 0">
            No hay resultados para "{{ searchQuery }}"
          </div>
        </section>
      </div>

      <span class="topbar__spacer"></span>

      <button mat-fab extended [matMenuTriggerFor]="profileMenu" class="profile-trigger"
        aria-label="Abrir menú de perfil">
        <mat-icon>account_circle</mat-icon>
        <span class="profile-trigger__text">
          <strong>{{ primerNombre }}</strong>
          <small>{{ authService.currentUser?.email }}</small>
        </span>
        <mat-icon iconPositionEnd>expand_more</mat-icon>
      </button>

      <mat-menu #profileMenu="matMenu" xPosition="before">
        <button mat-menu-item routerLink="/perfil">
          <mat-icon>person</mat-icon>
          <span>Mi perfil</span>
        </button>
        <button mat-menu-item routerLink="/mis-intercambios">
          <mat-icon>swap_horiz</mat-icon>
          <span>Mis intercambios</span>
        </button>
        <button mat-menu-item routerLink="/mis-articulos">
          <mat-icon>inventory_2</mat-icon>
          <span>Mis artículos</span>
        </button>
        <button mat-menu-item (click)="logout()" color="error" aria-label="Cerrar sesión">
          <mat-icon color="warn">logout</mat-icon>
          <span>Cerrar sesión</span>
        </button>
      </mat-menu>
    </mat-toolbar>
  </header>

  <main *ngIf="isReady">
    <router-outlet></router-outlet>
  </main>
</div>

<footer class="footer" *ngIf="mostrarLayout && isReady">
  <p>© 2026 TrikiTrueke — Todos los derechos reservados</p>
  <div class="social">
    <a href="https://www.instagram.com/paan.t0">
      <img src="assets/Instagram.png" alt="Instagram">
    </a>
  </div>
</footer>
